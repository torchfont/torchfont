[package]
name = "torchfont"
version = "0.9.2"
edition = "2024"
description = "Datasets, Transforms and Models specific to Vector Fonts"
license = "MIT"
repository = "https://github.com/torchfont/torchfont"

[lib]
name = "_torchfont"
crate-type = ["cdylib"]

[dependencies]
flo_curves = "0.8.0"
ignore = "0.4.25"
memmap2 = "0.9.10"
numpy = "0.28.0"
shellexpand = "3.1.2"
skrifa = "0.42.1"
tiny-skia = "0.12.0"
urlencoding = "2.1.3"
walkdir = "2.5.0"

[dependencies.pyo3]
version = "0.28.3"
features = ["abi3-py38"]
