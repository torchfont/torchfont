[package]
name = "torchfont"
version = "0.8.1"
edition = "2024"

[lib]
name = "_torchfont"
crate-type = ["cdylib"]

[dependencies]
ignore = "0.4.25"
memmap2 = "0.9.10"
shellexpand = "3.1.2"
skrifa = "0.42.0"
urlencoding = "2.1.3"
walkdir = "2.5.0"

[dependencies.pyo3]
version = "0.28.3"
features = ["abi3-py38"]
