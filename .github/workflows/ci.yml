name: CI

on:
  push:
    branches:
      - main
    tags:
      - '*'
    paths:
      - '**/*.rs'
      - '**/*.py'
      - '**/*.pyi'
      - 'tests/fonts/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'README.md'
      - '.python-version'
      - '.github/workflows/ci.yml'
      - '.github/scripts/**'
  pull_request:
    paths:
      - '**/*.rs'
      - '**/*.py'
      - '**/*.pyi'
      - 'tests/fonts/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'README.md'
      - '.python-version'
      - '.github/workflows/ci.yml'
      - '.github/scripts/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-static-check:
    name: Python static check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install skia-safe native dependencies
        run: sudo sh .github/scripts/install-linux-deps.sh host
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: "true"
      - run: uv run ruff format --diff
      - run: uv run ruff check
      - run: uv run ty check

  rust-static-check:
    name: Rust static check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install skia-safe native dependencies
        run: sudo sh .github/scripts/install-linux-deps.sh host
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo check --all-targets --all-features

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [python-static-check, rust-static-check]
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.10"
            torch-version: "2.3.*"
          - python-version: "3.14"
            torch-version: "2.10.*"
    steps:
      - uses: actions/checkout@v6
      - name: Install skia-safe native dependencies
        run: sudo sh .github/scripts/install-linux-deps.sh host
      - uses: Swatinem/rust-cache@v2
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: "true"
      - run: uv add "torch==${{ matrix.torch-version }}"
      - run: uv run pytest tests

  linux:
    runs-on: ${{ matrix.platform.runner }}
    # needs: test  # temporarily disabled for wheel build iteration
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
          - runner: ubuntu-22.04
            target: aarch64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        env:
          RUST_BACKTRACE: "1"
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          before-script-linux: . .github/scripts/install-linux-deps.sh ${{ matrix.platform.target }}
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          manylinux: manylinux_2_28
      - name: Build free-threaded wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist -i python3.14t
          before-script-linux: . .github/scripts/install-linux-deps.sh ${{ matrix.platform.target }}
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          manylinux: manylinux_2_28
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: dist

  windows:
    runs-on: ${{ matrix.platform.runner }}
    # needs: test  # temporarily disabled for wheel build iteration
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: windows-latest
            target: x64
            python_arch: x64
          - runner: windows-11-arm
            target: aarch64
            python_arch: arm64
    steps:
      - name: Enable long paths and shorten Cargo paths
        run: |
          git config --system core.longpaths true
          Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" -Name LongPathsEnabled -Value 1
          # GetFullPathNameA (ANSI) ignores LongPathsEnabled; keep the build tree
          # shallow so the un-normalized CWD+relative path stays under MAX_PATH (260)
          "CARGO_TARGET_DIR=C:\t" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
        shell: powershell
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          architecture: ${{ matrix.platform.python_arch }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14t"
          architecture: ${{ matrix.platform.python_arch }}
      - name: Build free-threaded wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist -i python3.14t
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-windows-${{ matrix.platform.target }}
          path: dist

  macos:
    runs-on: ${{ matrix.platform.runner }}
    # needs: test  # temporarily disabled for wheel build iteration
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: macos-15-intel
            target: x86_64
          - runner: macos-latest
            target: aarch64
    steps:
      - uses: actions/checkout@v6
      - name: Install skia-safe native dependencies
        run: brew install ninja
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14t"
      - name: Build free-threaded wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist -i python3.14t
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-macos-${{ matrix.platform.target }}
          path: dist

  sdist:
    runs-on: ubuntu-latest
    # needs: test  # temporarily disabled for wheel build iteration
    steps:
      - uses: actions/checkout@v6
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v7
        with:
          name: wheels-sdist
          path: dist

  release:
    name: Release
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' }}
    needs: [linux, windows, macos, sdist]
    environment: pypi
    permissions:
      id-token: write
      contents: write
      attestations: write
    steps:
      - uses: actions/download-artifact@v8
      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-path: 'wheels-*/*'
      - name: Install uv
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: astral-sh/setup-uv@v7
      - name: Publish to PyPI
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: uv publish --trusted-publishing always 'wheels-*/*'
